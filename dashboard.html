<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Reppo Analytics Dashboard</title>
  
  <meta name="theme-color" content="#050505">
  <link rel="icon" type="image/png" href="logo.png?v=2">
  <link rel="shortcut icon" href="logo.png?v=2">
  <link rel="apple-touch-icon" href="logo.png?v=2">

  <!-- Outfit Font for Premium Tech Look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Chart.js for data visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #050505;
      --surface: #121212;
      --surface-border: rgba(255, 255, 255, 0.08);
      --accent: #E2FF00; /* Neon Lime/Yellow */
      --accent-glow: rgba(226, 255, 0, 0.4);
      --text-prime: #ffffff;
      --text-sec: #9CA3AF;
      --card-bg: rgba(255,255,255,0.02);
      --card-gradient: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
      
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
      --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      color: var(--text-prime);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
      /* Subtle noise texture */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
    }

    /* Floating Orbs for Ambient Glow */
    .ambient-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      background: var(--accent);
      filter: blur(150px);
      border-radius: 50%;
      opacity: 0.1;
      pointer-events: none;
      z-index: 0;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
    }

    .dashboard-container {
      width: 100%;
      max-width: 1000px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      padding: 40px 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
      animation: fadeUp 0.6s ease-out forwards;
    }

    .app-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.4), inset 0 2px 2px rgba(255,255,255,0.15);
      overflow: hidden;
      border: 1px solid var(--surface-border);
    }
    .app-icon img { width: 100%; height: 100%; object-fit: cover; }

    .header-text {
      display: flex;
      flex-direction: column;
    }
    
    .title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(180deg, #FFFFFF 0%, #A1A1AA 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle {
      font-size: 14px;
      color: var(--text-sec);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .time-filter {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      color: var(--text-sec);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: var(--transition);
    }

    .time-filter:hover {
      border-color: rgba(226, 255, 0, 0.3);
      color: #FFF;
    }

    .time-filter.active {
      background: rgba(226, 255, 0, 0.1);
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .live-dot {
      width: 8px;
      height: 8px;
      background-color: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-glow);
      animation: pulse 2s infinite;
    }
    .live-dot.inactive {
      background-color: var(--text-sec);
      box-shadow: none;
      animation: none;
    }
    .subtitle-live-text.active {
      color: var(--accent);
      font-weight: 500;
    }

    /* Metric Cards Grid */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .metric-card {
      background: var(--card-bg);
      border: 1px solid var(--surface-border);
      border-radius: 20px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease-out 0.1s both;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    
    /* Dynamic Hover Spotlight */
    .metric-card::before, .chart-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: inherit;
      background: radial-gradient(600px circle at var(--mouse-x, 0) var(--mouse-y, 0), rgba(226, 255, 0, 0.08), transparent 40%);
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    /* Glow effect on hover */
    .metric-card:hover::before, .chart-card:hover::before {
      opacity: 1;
    }

    .metric-card:hover {
      border-color: rgba(226, 255, 0, 0.4);
      box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(226, 255, 0, 0.05);
      transform: translateY(-4px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    /* Keep text above spotlight */
    .metric-title, .metric-value, .chart-header, .chart-container {
      position: relative;
      z-index: 1;
    }

    .metric-title {
      font-size: 14px;
      color: var(--text-sec);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .metric-value {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 800;
      color: #FFF;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    
    .metric-trend {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(226, 255, 0, 0.1);
      padding: 4px 8px;
      border-radius: 8px;
      font-family: var(--font-body);
    }

    /* Charts Area */
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
    }
    
    @media (max-width: 768px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }
    }

    .chart-card {
      background: var(--card-bg);
      border: 1px solid var(--surface-border);
      border-radius: 20px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease-out 0.2s both;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .chart-card:hover {
      border-color: rgba(226, 255, 0, 0.3);
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      transform: translateY(-2px);
    }
    
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    
    .chart-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: #FFF;
    }
    
    .chart-container {
      position: relative;
      height: 300px;
      width: 100%;
    }
    
    /* Footer */
    .footer {
      margin-top: auto;
      padding-top: 40px;
      text-align: center;
      font-size: 13px;
      color: #555;
    }
    .footer a {
      color: var(--text-sec);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover { color: #FFF; }

    /* Skeleton Loader */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 8px;
    }

    .skeleton-text {
      height: 36px;
      width: 100px;
      display: inline-block;
    }
    
    .skeleton-chart {
      height: 100%;
      width: 100%;
      border-radius: 12px;
    }

    /* Animations */
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(226, 255, 0, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(226, 255, 0, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(226, 255, 0, 0); }
    }
  </style>
</head>
<body>

  <!-- Ambient Glow -->
  <div class="ambient-glow"></div>

  <div class="dashboard-container">
    
    <!-- Header -->
    <header class="header">
      <div class="app-icon">
        <img src="logo.png" alt="Reppo Logo">
      </div>
      <div class="header-text">
        <h1 class="title">Metrics / Reppo</h1>
        <div class="subtitle">
          <div class="live-dot" id="live-dot"></div>
          <span id="live-text" class="subtitle-live-text">Live Data Overview</span>
        </div>
      </div>
      
      <div class="header-actions">
        <button class="time-filter active" data-days="7">7D</button>
        <button class="time-filter" data-days="30">30D</button>
        <button class="time-filter" data-days="90">90D</button>
      </div>
    </header>

    <!-- Top Metrics -->
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-title">Total Visits</div>
        <div class="metric-value" id="val-visits">
          -- <span class="metric-trend">---</span>
        </div>
      </div>
      
      <div class="metric-card">
        <div class="metric-title">Download Clicks</div>
        <div class="metric-value" id="val-clicks">
          -- <span class="metric-trend">---</span>
        </div>
      </div>
      
      <div class="metric-card">
        <div class="metric-title">Conversion Rate</div>
        <div class="metric-value" id="val-conversion">
          --%
        </div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <!-- Main Line Chart: Traffic over time -->
      <div class="chart-card">
        <div class="chart-header">
          <h2 class="chart-title">Traffic & Conversions</h2>
        </div>
        <div class="chart-container" id="mainChartContainer">
          <div class="skeleton skeleton-chart" id="mainChartSkeleton"></div>
          <canvas id="mainChart" style="opacity: 0; transition: opacity 0.5s ease;"></canvas>
        </div>
      </div>
      
      <!-- Doughnut Chart: Traffic Sources -->
      <div class="chart-card">
        <div class="chart-header">
          <h2 class="chart-title">Top Countries</h2>
        </div>
        <div class="chart-container" id="sourceChartContainer">
          <div class="skeleton skeleton-chart" id="sourceChartSkeleton"></div>
          <canvas id="sourceChart" style="opacity: 0; transition: opacity 0.5s ease;"></canvas>
        </div>
      </div>
    </div>
    
    <footer class="footer">
      <p>Secure Reppo Dashboard • <a href="index.html">View Landing Page</a></p>
    </footer>

  </div>

  <script>
    // Global Chart Defaults matching Reppo aesthetic
    Chart.defaults.color = '#9CA3AF';
    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.scale.grid.color = 'rgba(255, 255, 255, 0.05)';
    Chart.defaults.scale.grid.tickColor = 'rgba(255, 255, 255, 0)';

    let mainChartInstance = null;
    let sourceChartInstance = null;
    let currentDays = 7;
    
    // Smooth number counter animation
    function animateValue(obj, start, end, duration) {
      // If updating the trend span, don't animate the HTML structure, just set it
      let startTimestamp = null;
      const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        // Easing function (easeOutExpo)
        const easeProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
        
        let currentVal = start + (end - start) * easeProgress;
        
        // Check if it's a float (CVR) or Int (Visits/Clicks)
        if (Number.isInteger(end) && Number.isInteger(start)) {
          obj.childNodes[0].nodeValue = Math.floor(currentVal) + ' '; 
        } else {
          obj.childNodes[0].nodeValue = currentVal.toFixed(1) + (obj.id === 'val-conversion' ? '%' : ' ');
        }
        
        if (progress < 1) {
          window.requestAnimationFrame(step);
        }
      };
      window.requestAnimationFrame(step);
    }
    
    function setSkeletonState(isLoading) {
      const metrics = ['val-visits', 'val-clicks', 'val-conversion'];
      if(isLoading) {
        metrics.forEach(m => document.getElementById(m).innerHTML = '<div class="skeleton skeleton-text"></div>');
        if(!mainChartInstance) document.getElementById('mainChartSkeleton').style.display = 'block';
        if(!sourceChartInstance) document.getElementById('sourceChartSkeleton').style.display = 'block';
      } else {
        document.getElementById('mainChartSkeleton').style.display = 'none';
        document.getElementById('sourceChartSkeleton').style.display = 'none';
        document.getElementById('mainChart').style.opacity = '1';
        document.getElementById('sourceChart').style.opacity = '1';
      }
    }

    async function fetchAnalyticsData(days = 7) {
      const isInitialLoad = !mainChartInstance;
      currentDays = days;
      const trendLabel = days === 1 ? "Today" : `${days} Days`;
      
      if (isInitialLoad) {
        setSkeletonState(true);
      } else {
         // Subtle fade for refresh
         document.getElementById('mainChart').style.opacity = '0.5';
         document.getElementById('sourceChart').style.opacity = '0.5';
      }

      try {
        const response = await fetch(`/api/analytics?days=${days}`);
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        const data = await response.json();
        
        const totalVisits = data.daily.visits.reduce((a, b) => a + Number(b), 0);
        const totalClicks = data.daily.clicks.reduce((a, b) => a + Number(b), 0);
        const cvr = totalVisits > 0 ? parseFloat(((totalClicks / totalVisits) * 100).toFixed(1)) : 0.0;

        // Update UI HTML structure if initially loading
        if (isInitialLoad) {
          document.getElementById('val-visits').innerHTML = `0 <span class="metric-trend" style="color:#FFF; background:rgba(255,255,255,0.1)">${trendLabel}</span>`;
          document.getElementById('val-clicks').innerHTML = `0 <span class="metric-trend" style="color:#FFF; background:rgba(255,255,255,0.1)">${trendLabel}</span>`;
          document.getElementById('val-conversion').innerHTML = `0.0%`;
        } else {
          // Update the trend labels silently
          document.querySelector('#val-visits .metric-trend').innerText = trendLabel;
          document.querySelector('#val-clicks .metric-trend').innerText = trendLabel;
        }

        // Animate numbers
        const currentVisits = isInitialLoad ? 0 : parseInt(document.getElementById('val-visits').childNodes[0].nodeValue || 0);
        const currentClicks = isInitialLoad ? 0 : parseInt(document.getElementById('val-clicks').childNodes[0].nodeValue || 0);
        const currentCvr = isInitialLoad ? 0.0 : parseFloat(document.getElementById('val-conversion').childNodes[0].nodeValue || 0);

        animateValue(document.getElementById('val-visits'), currentVisits, totalVisits, 1000);
        animateValue(document.getElementById('val-clicks'), currentClicks, totalClicks, 1000);
        animateValue(document.getElementById('val-conversion'), currentCvr, cvr, 1000);

        // Render Charts Smoothly
        setSkeletonState(false);
        renderMainChart(data.daily);
        renderSourceChart(data.source);
        
      } catch (error) {
        console.error('Error fetching data:', error);
        document.getElementById('val-visits').innerText = 'Error';
        document.getElementById('val-clicks').innerText = 'Error';
      }
    }

    function renderMainChart(dailyData) {
      const ctxMain = document.getElementById('mainChart').getContext('2d');
      
      const gradientVisits = ctxMain.createLinearGradient(0, 0, 0, 300);
      gradientVisits.addColorStop(0, 'rgba(255, 255, 255, 0.1)');
      gradientVisits.addColorStop(1, 'rgba(255, 255, 255, 0)');

      const gradientClicks = ctxMain.createLinearGradient(0, 0, 0, 300);
      gradientClicks.addColorStop(0, 'rgba(226, 255, 0, 0.4)');
      gradientClicks.addColorStop(1, 'rgba(226, 255, 0, 0)');

      if (mainChartInstance) {
        // Update existing chart smoothly
        mainChartInstance.data.labels = dailyData.dates;
        mainChartInstance.data.datasets[0].data = dailyData.clicks;
        mainChartInstance.data.datasets[1].data = dailyData.visits;
        mainChartInstance.update({
             duration: 800,
             easing: 'easeOutQuart'
        });
      } else {
        // Create new chart
        mainChartInstance = new Chart(ctxMain, {
          type: 'line',
          data: {
            labels: dailyData.dates,
            datasets: [
              {
                label: 'Download Clicks',
                data: dailyData.clicks,
                borderColor: '#E2FF00',
                backgroundColor: gradientClicks,
                borderWidth: 3,
                tension: 0.4,
                fill: true,
                pointBackgroundColor: '#121212',
                pointBorderColor: '#E2FF00',
                pointBorderWidth: 2,
                pointRadius: 4,
                pointHoverRadius: 6
              },
              {
                label: 'Page Visits',
                data: dailyData.visits,
                borderColor: '#FFFFFF',
                backgroundColor: gradientVisits,
                borderWidth: 2,
                borderDash: [5, 5],
                tension: 0.4,
                fill: true,
                pointRadius: 0,
                pointHoverRadius: 0
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: {
              duration: 1200,
              easing: 'easeOutQuart'
            },
            plugins: {
              legend: {
                position: 'top',
                align: 'end',
                labels: {
                  usePointStyle: true,
                  boxWidth: 8,
                  boxHeight: 8
                }
              },
              tooltip: {
                backgroundColor: 'rgba(0,0,0,0.8)',
                titleFont: { family: "'Outfit', sans-serif", size: 14 },
                bodyFont: { family: "'Inter', sans-serif", size: 13 },
                padding: 12,
                cornerRadius: 8,
                displayColors: false
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                border: { display: false }
              },
              x: {
                border: { display: false }
              }
            },
            interaction: {
              mode: 'index',
              intersect: false,
            }
          }
        });
      }
    }

    function renderSourceChart(sourceData) {
      const ctxSource = document.getElementById('sourceChart').getContext('2d');

      if (sourceChartInstance) {
        // Smoothly update Source Chart
        sourceChartInstance.data.labels = sourceData.countries;
        sourceChartInstance.data.datasets[0].data = sourceData.countryValues;
        sourceChartInstance.update({
             duration: 800,
             easing: 'easeOutQuart'
        });
      } else {
        sourceChartInstance = new Chart(ctxSource, {
          type: 'doughnut',
          data: {
            labels: sourceData.countries.length > 0 ? sourceData.countries : ['No Data'],
            datasets: [{
              data: sourceData.countryValues.length > 0 ? sourceData.countryValues : [1],
              backgroundColor: sourceData.countryValues.length > 0 ? [
                '#E2FF00', '#FFFFFF', '#9CA3AF', '#4B5563', '#1F2937'
              ] : ['#1F2937'],
              borderWidth: 0,
              hoverOffset: 4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '75%',
            animation: {
              duration: 1200,
              easing: 'easeOutQuart'
            },
            plugins: {
              legend: {
                position: 'bottom',
                labels: {
                  usePointStyle: true,
                  boxWidth: 8,
                  boxHeight: 8,
                  padding: 20
                }
              },
              tooltip: {
                backgroundColor: 'rgba(0,0,0,0.8)',
                callbacks: {
                  label: function(context) {
                    return ` ${context.label}: ${context.raw}`;
                  }
                }
              }
            }
          }
        });
      }
    }

    // Handle Filter Clicks
    document.querySelectorAll('.time-filter').forEach(btn => {
      btn.addEventListener('click', (e) => {
        // Prevent clicking the active one again
        if(e.target.classList.contains('active')) return;
        
        // Remove active class from all
        document.querySelectorAll('.time-filter').forEach(b => b.classList.remove('active'));
        // Add active class to clicked
        e.target.classList.add('active');
        // Fetch data
        const days = parseInt(e.target.getAttribute('data-days'));
        fetchAnalyticsData(days);
      });
    });
    
    // Dynamic Mouse Spotlight Effect
    document.querySelectorAll('.metric-card, .chart-card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        card.style.setProperty('--mouse-x', `${x}px`);
        card.style.setProperty('--mouse-y', `${y}px`);
      });
    });

    async function fetchRealtimeActiveUsers() {
      try {
        const res = await fetch('/api/analytics?realtime=true');
        if (res.ok) {
          const data = await res.json();
          const count = data.activeUsers || 0;
          const textEl = document.getElementById('live-text');
          const dotEl = document.getElementById('live-dot');
          
          if (count > 0) {
            textEl.innerText = `${count} Active User${count !== 1 ? 's' : ''} Right Now`;
            textEl.classList.add('active');
            dotEl.classList.remove('inactive');
          } else {
            textEl.innerText = '0 Active Users right now';
            textEl.classList.remove('active');
            dotEl.classList.add('inactive');
          }
        }
      } catch (e) {
        console.error('Error fetching realtime users:', e);
      }
    }

    // Load data on page load
    document.addEventListener('DOMContentLoaded', () => {
      fetchAnalyticsData(7);
      fetchRealtimeActiveUsers();
      // Poll real-time active users every 15 seconds
      setInterval(fetchRealtimeActiveUsers, 15000);
    });
  </script>
</body>
</html>
